<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Vocabulary Quiz</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #6c63ff;
      --primary-dk: #574fd6;
      --secondary:  #48cfad;
      --bg:         #0f0f1a;
      --surface:    #16213e;
      --surface2:   #1e2a45;
      --text:       #eef0ff;
      --muted:      #7a869a;
      --border:     rgba(255,255,255,0.08);
      --shadow:     0 28px 70px rgba(0,0,0,.65);
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 15% 15%, rgba(108,99,255,.14) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 85%, rgba(72,207,173,.09) 0%, transparent 55%);
      color: var(--text);
      min-height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* ── Header bar ── */
    .deck-bar {
      width: 100%;
      background: rgba(22,33,62,.95);
      border-bottom: 1px solid rgba(108,99,255,.25);
      padding: 11px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky; top: 0; z-index: 10;
      backdrop-filter: blur(10px);
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .bar-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .deck-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(108,99,255,.18);
      border: 1px solid rgba(108,99,255,.3);
      border-radius: 100px;
      padding: 4px 12px;
      font-size: .78rem; font-weight: 600; color: #c4b5fd;
    }

    .deck-badge .dot {
      width: 6px; height: 6px;
      background: var(--secondary);
      border-radius: 50%; flex-shrink: 0;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px;
      border: none; border-radius: 10px;
      font-size: .88rem; font-weight: 600;
      cursor: pointer;
      transition: all .16s ease;
      white-space: nowrap;
      user-select: none;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .35; cursor: default; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #7c6af5);
      color: #fff;
      box-shadow: 0 4px 20px rgba(108,99,255,.35);
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }

    .btn-ghost {
      background: rgba(255,255,255,.06);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,.12); color: var(--text); }

    .btn-sm { padding: 7px 14px; font-size: .8rem; border-radius: 8px; }

    /* ── Main layout ── */
    .quiz-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 40px;
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
    }

    /* ── Progress ── */
    .progress-block { width: 100%; margin-bottom: 28px; }

    .progress-track {
      height: 5px;
      background: rgba(255,255,255,.07);
      border-radius: 100px; overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-fill {
      height: 100%; border-radius: 100px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width .35s ease;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .progress-text { color: var(--muted); font-size: .83rem; }
    .progress-score { color: var(--secondary); font-size: .83rem; font-weight: 600; }

    /* ── Question card ── */
    .q-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid rgba(108,99,255,.2);
      border-radius: 22px;
      padding: 36px 32px 28px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }

    .q-label {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .q-synonym {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 28px;
    }

    .q-prompt {
      font-size: .82rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .q-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: .65rem .9rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .q-input:focus { border-color: var(--primary); }
    .q-input:disabled { opacity: .5; }

    /* ── Feedback ── */
    .feedback {
      margin-top: 16px;
      font-size: .9rem;
      font-weight: 600;
      min-height: 1.4em;
      border-radius: 8px;
      padding: .5rem .8rem;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct {
      background: rgba(34,197,94,.12);
      color: #86efac;
      border: 1px solid rgba(34,197,94,.3);
    }
    .feedback.wrong {
      background: rgba(239,68,68,.13);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,.3);
    }

    /* ── Next button row ── */
    .next-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
    }

    /* ── Results screen ── */
    #screen-results {
      display: none;
      width: 100%;
      text-align: center;
    }

    .results-card {
      background: var(--surface);
      border: 1px solid rgba(108,99,255,.25);
      border-radius: 22px;
      padding: 44px 32px;
      box-shadow: var(--shadow);
    }

    .results-title {
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .results-pct {
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 12px;
    }

    .results-raw {
      font-size: 1.1rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .results-raw strong { color: var(--text); }

    .results-btns {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 420px) {
      .q-card { padding: 24px 20px 20px; }
      .results-card { padding: 32px 20px; }
      .deck-bar { padding: 9px 14px; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<div class="deck-bar">
  <div class="bar-left">
    <span class="bar-title">&#128218; Vocabulary Quiz</span>
    <div class="deck-badge">
      <span class="dot"></span>
      <span id="deck-info">Loading&hellip;</span>
    </div>
  </div>
  <a href="/" class="btn btn-ghost btn-sm">&#8592; Quit</a>
</div>


<!-- ── Quiz screen ── -->
<div class="quiz-wrap" id="screen-quiz">

  <div class="progress-block">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label">
      <span class="progress-text" id="progress-text">Question 1 of —</span>
      <span class="progress-score" id="running-score"></span>
    </div>
  </div>

  <div class="q-card">
    <div class="q-label">Synonym clue</div>
    <div class="q-synonym" id="q-synonym"></div>
    <div class="q-prompt">What vocabulary word matches this synonym?</div>
    <div class="input-row">
      <input class="q-input" type="text" id="q-input"
             placeholder="Type the word&hellip;"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn btn-primary" id="btn-submit">Submit</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="next-row" id="next-row" style="display:none">
    <button class="btn btn-ghost" id="btn-next">Next &#8594;</button>
  </div>

</div>


<!-- ── Empty-deck screen ── -->
<div class="quiz-wrap" id="screen-empty" style="display:none">
  <div class="results-card" style="text-align:center">
    <div style="font-size:2.5rem;margin-bottom:16px">&#128218;</div>
    <p style="font-size:.95rem;line-height:1.7;color:var(--muted);margin-bottom:24px">
      Your deck needs at least 2 words to take a quiz.<br>
      Go back and load a larger deck.
    </p>
    <a href="/" class="btn btn-primary">&#8592; Back to Flashcards</a>
  </div>
</div>


<!-- ── Results screen ── -->
<div class="quiz-wrap" id="screen-results">
  <div class="results-card">
    <div class="results-title">Quiz Complete</div>
    <div class="results-pct" id="results-pct">—%</div>
    <div class="results-raw" id="results-raw"></div>
    <div class="results-btns">
      <button class="btn btn-primary" id="btn-retake">&#8635; Retake Quiz</button>
      <a href="/" class="btn btn-ghost">&#8592; Back to Flashcards</a>
    </div>
  </div>
</div>


<script>
'use strict';

// ── Server-injected deck ────────────────────────────────────────────────────
const DECK_DATA = {{ deck_data | tojson }};

// ── State ───────────────────────────────────────────────────────────────────
let questions = [];   // [{word, synonym}]
let idx       = 0;
let correct   = 0;
let answered  = false;

// ── DOM refs ────────────────────────────────────────────────────────────────
const deckInfo     = document.getElementById('deck-info');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const runningScore = document.getElementById('running-score');
const qSynonym     = document.getElementById('q-synonym');
const qInput       = document.getElementById('q-input');
const btnSubmit    = document.getElementById('btn-submit');
const feedback     = document.getElementById('feedback');
const nextRow      = document.getElementById('next-row');
const btnNext      = document.getElementById('btn-next');
const screenQuiz   = document.getElementById('screen-quiz');
const screenRes    = document.getElementById('screen-results');
const resultsPct   = document.getElementById('results-pct');
const resultsRaw   = document.getElementById('results-raw');
const btnRetake    = document.getElementById('btn-retake');

// ── Helpers ─────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

// ── Build question list ──────────────────────────────────────────────────────
function buildQuestions() {
  const valid = DECK_DATA.filter(d => d.word && d.synonyms && d.synonyms.length > 0);
  return shuffle(valid).map(d => ({ word: d.word, synonym: pick(d.synonyms) }));
}

// ── Start / retake ───────────────────────────────────────────────────────────
function startQuiz() {
  questions = buildQuestions();
  idx       = 0;
  correct   = 0;
  answered  = false;

  const n = questions.length;
  deckInfo.textContent = n + ' word' + (n !== 1 ? 's' : '');

  screenRes.style.display  = 'none';
  screenQuiz.style.display = '';

  showQuestion();
}

// ── Render current question ──────────────────────────────────────────────────
function showQuestion() {
  answered = false;
  const total = questions.length;

  progressFill.style.width = (idx / total * 100) + '%';
  progressText.textContent = `Question ${idx + 1} of ${total}`;
  runningScore.textContent = correct > 0 ? `${correct} correct` : '';

  qSynonym.textContent = questions[idx].synonym;
  qInput.value         = '';
  qInput.disabled      = false;
  btnSubmit.disabled   = false;

  feedback.className   = 'feedback';
  feedback.textContent = '';
  nextRow.style.display = 'none';

  qInput.focus();
}

// ── Grade answer ─────────────────────────────────────────────────────────────
function submitAnswer() {
  if (answered) return;

  const guess  = qInput.value.trim().toLowerCase();
  const target = questions[idx].word.toLowerCase();

  if (!guess) {
    qInput.focus();
    return;
  }

  answered = true;
  qInput.disabled  = true;
  btnSubmit.disabled = true;

  if (guess === target) {
    correct++;
    feedback.textContent = '&#10003; Correct!';
    feedback.className   = 'feedback correct show';
  } else {
    feedback.innerHTML = `&#10007; Incorrect. The answer was <strong>${escHtml(questions[idx].word)}</strong>.`;
    feedback.className = 'feedback wrong show';
  }

  runningScore.textContent = correct > 0 ? `${correct} correct` : '';

  const isLast = idx === questions.length - 1;
  nextRow.style.display = '';
  btnNext.textContent   = isLast ? 'See Results' : 'Next \u2192';
  btnNext.focus();
}

// ── Advance ──────────────────────────────────────────────────────────────────
function advance() {
  if (idx < questions.length - 1) {
    idx++;
    showQuestion();
  } else {
    showResults();
  }
}

// ── Results ──────────────────────────────────────────────────────────────────
function showResults() {
  screenQuiz.style.display = 'none';
  screenRes.style.display  = '';

  const total = questions.length;
  const pct   = total > 0 ? Math.round(correct / total * 100) : 0;

  progressFill.style.width = '100%';
  resultsPct.textContent   = pct + '%';
  resultsRaw.innerHTML     = `<strong>${correct} / ${total}</strong> correct`;
}

// ── Escape helper ─────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Event wiring ─────────────────────────────────────────────────────────────
btnSubmit.addEventListener('click', submitAnswer);
btnNext.addEventListener('click', advance);
btnRetake.addEventListener('click', startQuiz);

qInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.preventDefault();
    answered ? advance() : submitAnswer();
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
if (DECK_DATA.length < 2) {
  document.getElementById('screen-quiz').style.display   = 'none';
  document.getElementById('screen-empty').style.display  = '';
  document.getElementById('deck-info').textContent       = DECK_DATA.length + ' word' + (DECK_DATA.length !== 1 ? 's' : '');
} else {
  startQuiz();
}
</script>
</body>
</html>
